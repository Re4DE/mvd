name: re4de-central-services-dcp

volumes:
  postgres_data:
  vault_data:
  mongo_data:

networks:
  dataspace-net:
    external: true
    name: dataspace-net

services:
  # Dataspace issuer + Database + Vault
  issuer:
    image: ghcr.io/re4de/dataspace-issuer:1.1.0-edc0.14.0
    networks:
      - default
      - dataspace-net
    depends_on:
      postgresql:
        condition: service_healthy
        restart: true
      vault:
        condition: service_healthy
        restart: true
    environment:
      EDC_PARTICIPANT_ID: did:web:issuer%3A20085:issuer
      EDC_COMPONENT_ID: issuer
      EDC_HOSTNAME: issuer
      EDC_ISSUER_API_SUPERUSER_KEY: c3VwZXItdXNlcg==.devpass
      EDC_ISSUER_DID: did:web:issuer%3A20085:issuer
      EDC_ISSUER_BASE_URL: http://issuer:20086
      EDC_ISSUER_STATUSLIST_SIGNING_KEY_ALIAS: statuslist-signing-key
      EDC_VAULT_HASHICORP_URL: http://vault:8200
      EDC_VAULT_HASHICORP_TOKEN: devpass
      WEB_HTTP_PORT: 8180
      EDC_SQL_SCHEMA_AUTOCREATE: true
      EDC_DATASOURCE_DEFAULT_USER: edc
      EDC_DATASOURCE_DEFAULT_PASSWORD: devpass
      EDC_DATASOURCE_DEFAULT_URL: jdbc:postgresql://postgresql:5432/edc

  postgresql:
    image: postgres:18.2-alpine3.23
    networks:
      - default
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: edc
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: devpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - "postgres_data:/var/lib/postgresql/18/docker"
      - "./config/postgres/central/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql"

  vault:
    image: hashicorp/vault:1.21.4
    command: [ "vault", "server", "-config=/vault/config" ]
    networks:
      - default
    environment:
      VAULT_API_ADDR: http://127.0.0.1:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_DEV_ROOT_TOKEN_ID: devpass
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/file"}}, "default_lease_ttl": "168h", "max_lease_ttl": "720h"}'
      VAULT_SUPPLEMENTAL_CONFIG: '{"ui": false, "listener": [{"tcp": { "address": "0.0.0.0:8200", "tls_disable": true}}]}'
    healthcheck:
      test: ["CMD", "wget", "--spider", "--proxy", "off", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    cap_add:
      - IPC_LOCK
    volumes:
      - "./config/vault/central/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh"
      - "vault_data:/vault"

  # Connector Registry + Database
  connector-registry:
    image: ghcr.io/re4de/connector-registry:1.0.1-edc0.14.0
    networks:
      - default
      - dataspace-net
    environment:
      MONGO_HOST: mongodb
    depends_on:
      mongodb:
        condition: service_healthy
        restart: true

  mongodb:
    image: mongo:8.2.5-noble
    networks:
      - default
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devpass
      MONGO_INITDB_DATABASE: registry
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({serverStatus:1}).ok' | mongosh admin -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} | grep 1"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    volumes:
      - mongo_data:/data/db
      - ./config/mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro